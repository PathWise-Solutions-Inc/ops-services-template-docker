_format_version: "2.1"
_transform: true

services:
  - name: auth-v1-open
    url: http://postgrest:3000/auth/v1/
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/

  - name: rest-v1
    url: http://postgrest:3000/rest/v1/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          credentials: true
          exposed_headers:
            - content-range
            - x-total-count

plugins:
  - name: cors
    config:
      origins:
        - "*"
      credentials: true
      exposed_headers:
        - content-range
        - x-total-count
